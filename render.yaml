services:
  - name: logiflow-backend
    type: web
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://your-frontend-service.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: logiflow-db
          property: connectionString

  - name: logiflow-frontend
    type: web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: VITE_API_URL
        value: https://your-backend-service.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: logiflow-db
    plan: free
    region: oregon
    databaseName: logiflow
    postgresMajorVersion: "18"
